spring:
  application:
    name: cash
  datasource:
    url: jdbc:postgresql://localhost:5435/cashdb
    username: cash
    password: cash
  jpa:
    properties:
      hibernate:
       dialect: org.hibernate.dialect.PostgreSQLDialect
       show_sql: true
 

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegister: true
    registerWithRegister: true
    serviceUrl:
      defaultZone: "http://localhost:1993/eureka/"

management:
  endpoints:
    web:
      exposure:
        includes: "*"
  info:
    env:
      enabled: true
      
  endpoint:
    shutdown:
      access: unrestricted
info:
  app:
    name: ${spring.application.name}
    description: "Microservice Cash of Leina Tontine Backend"
    contact: "VERON-SOLUTIONS"

server:
  port: 1968
      
      
